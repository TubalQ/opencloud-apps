# Proxy routes for the Calendar app - a bare list of route entries, merged into
# the generated proxy.yaml by assemble.sh. Do not add an additional_policies wrapper.
- endpoint: /caldav/
  backend: http://radicale:5232
  remote_user_header: X-Remote-User
  skip_x_access_token: true
  additional_headers:
    - X-Script-Name: /caldav
- endpoint: /.well-known/caldav
  backend: http://radicale:5232
  remote_user_header: X-Remote-User
  skip_x_access_token: true
  additional_headers:
    - X-Script-Name: /caldav
- endpoint: /calendar-bridge/
  backend: http://oc-calendar-bridge:8080
  remote_user_header: X-Remote-User
  skip_x_access_token: true
- endpoint: /cal/
  backend: http://oc-calendar-bridge:8080
  unprotected: true
  skip_x_access_token: true
